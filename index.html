<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Batista Store - BookStore Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .book-card:hover { transform: translateY(-4px); transition: 0.2s; }
  .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
</style>
</head>
<body class="bg-gray-50">

<header class="bg-white shadow-sm sticky top-0 z-50">
  <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-indigo-600">📚 Batista Store</h1>
    <div class="flex gap-4 items-center">
      <button id="cartBtn" class="relative">
        🛒 Cart <span id="cartCount" class="bg-red-500 text-white text-xs px-2 py-0.5 rounded-full">0</span>
      </button>
      <button id="adminLoginBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm">Admin</button>
    </div>
  </div>
</header>

<main id="shopPage" class="max-w-7xl mx-auto px-4 py-6">
  <div class="mb-6 flex flex-col sm:flex-row gap-3">
    <input id="searchInput" type="text" placeholder="Search by title, author, ISBN..." 
           class="flex-1 px-4 py-2 border rounded-lg">
    <select id="genreFilter" class="px-4 py-2 border rounded-lg">
      <option value="">All Genres</option>
      <option>Fiction</option><option>Non-fiction</option><option>Sci-fi</option>
      <option>Romance</option><option>Mystery</option><option>Academic</option>
    </select>
  </div>
  
  <div id="bookGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4"></div>
  <div class="text-center mt-6">
    <button id="loadMoreBtn" class="bg-gray-200 px-6 py-2 rounded-lg hidden">Load More Books</button>
  </div>
  <div id="loadingBooks" class="text-center py-10 text-gray-500">Loading books...</div>
</main>

<div id="cartSidebar" class="fixed top-0 right-0 h-full w-80 bg-white shadow-2xl transform translate-x-full transition-transform z-50 p-4 overflow-y-auto">
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl font-bold">Your Cart</h2>
    <button id="closeCart">✕</button>
  </div>
  <div id="cartItems" class="space-y-3"></div>
  <div class="border-t mt-4 pt-4">
    <div class="flex justify-between font-bold text-lg">
      <span>Total:</span><span id="cartTotal">$0.00</span>
    </div>
    <button id="checkoutBtn" class="w-full bg-green-600 text-white py-2 rounded-lg mt-3">Checkout COD</button>
  </div>
</div>

<div id="adminModal" class="fixed inset-0 bg-black bg-opacity-50 hidden z-50 overflow-y-auto">
  <div class="bg-white p-6 rounded-xl w-full max-w-4xl mx-4 my-8">
    <div id="adminLoginForm">
      <h3 class="text-xl font-bold mb-4">Admin Login</h3>
      <input id="adminPass" type="password" placeholder="Enter Admin Password" 
             class="w-full px-4 py-2 border rounded-lg mb-3">
      <button id="adminLoginSubmit" class="w-full bg-indigo-600 text-white py-2 rounded-lg">Login</button>
      <button id="closeAdminModal" class="w-full text-gray-500 mt-2">Cancel</button>
    </div>
    
    <div id="adminPanel" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-xl font-bold">Admin Dashboard</h3>
        <button id="adminLogout" class="bg-red-500 text-white px-3 py-1 rounded text-sm">Logout</button>
      </div>
      
      <div class="flex gap-2 mb-4 border-b">
        <button class="adminTab px-4 py-2 border-b-2 border-indigo-600" data-tab="add">Add Book</button>
        <button class="adminTab px-4 py-2" data-tab="manage">Manage Books</button>
        <button class="adminTab px-4 py-2" data-tab="orders">Orders</button>
      </div>
      
      <div id="addTab" class="adminTabContent">
        <form id="addBookForm" class="grid grid-cols-2 gap-3">
          <input name="title" placeholder="Book Title" required class="px-3 py-2 border rounded">
          <input name="author" placeholder="Author" required class="px-3 py-2 border rounded">
          <input name="isbn" placeholder="ISBN" class="px-3 py-2 border rounded">
          <input name="price" type="number" step="0.01" placeholder="Price" required class="px-3 py-2 border rounded">
          <input name="stock" type="number" placeholder="Stock" required class="px-3 py-2 border rounded">
          <select name="genre" required class="px-3 py-2 border rounded">
            <option value="">Select Genre</option>
            <option>Fiction</option><option>Non-fiction</option><option>Sci-fi</option>
            <option>Romance</option><option>Mystery</option><option>Academic</option>
          </select>
          <input name="cover" type="url" placeholder="Cover Image URL" required class="col-span-2 px-3 py-2 border rounded">
          <textarea name="desc" placeholder="Description" rows="2" class="col-span-2 px-3 py-2 border rounded"></textarea>
          <button type="submit" class="col-span-2 bg-green-600 text-white py-2 rounded-lg">Add Book</button>
        </form>
      </div>
      
      <div id="manageTab" class="adminTabContent hidden">
        <div id="adminBookList" class="space-y-2 max-h-96 overflow-y-auto"></div>
      </div>
      
      <div id="ordersTab" class="adminTabContent hidden">
        <div id="adminOrderList" class="space-y-2 max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js'
import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, limit, startAfter, onSnapshot, doc, updateDoc, deleteDoc, writeBatch } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js'

const firebaseConfig = {
  apiKey: "AIzaSyDiFzQw5i0SUUKFYENoI3z2fddOo0zGgHI",
  authDomain: "dijanglung-store.firebaseapp.com",
  projectId: "dijanglung-store",
  storageBucket: "dijanglung-store.firebasestorage.app",
  messagingSenderId: "518841624564",
  appId: "1:518841624564:web:19430ed96d880b09a5fba1"
};

const ADMIN_PASSWORD = "@Batis@#"; // CHANGE THIS PASSWORD

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let lastVisible = null;
let allBooks = [];
let cart = JSON.parse(localStorage.getItem('bookCart') || '[]');
const PAGE_SIZE = 20;

function loadBooks(isNewQuery = true) {
  if (isNewQuery) {
    allBooks = [];
    lastVisible = null;
    document.getElementById('bookGrid').innerHTML = '';
  }
  
  let q = query(collection(db, "books"), orderBy("createdAt", "desc"), limit(PAGE_SIZE));
  if (lastVisible) q = query(q, startAfter(lastVisible));
  
  onSnapshot(q, (snapshot) => {
    document.getElementById('loadingBooks').classList.add('hidden');
    if (snapshot.empty && isNewQuery) {
      document.getElementById('bookGrid').innerHTML = '<p class="col-span-full text-center text-gray-500 py-10">No books yet. Admin, add some!</p>';
      return;
    }
    
    lastVisible = snapshot.docs[snapshot.docs.length - 1];
    const newBooks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    
    if (isNewQuery) allBooks = newBooks;
    else allBooks.push(...newBooks);
    
    renderBooks(allBooks);
    document.getElementById('loadMoreBtn').classList.toggle('hidden', snapshot.size < PAGE_SIZE);
  });
}

function renderBooks(books) {
  const grid = document.getElementById('bookGrid');
  grid.innerHTML = books.map(book => `
    <div class="book-card bg-white rounded-lg shadow p-3">
      <img src="${book.cover}" alt="${book.title}" class="w-full h-48 object-cover rounded mb-2">
      <h3 class="font-semibold text-sm line-clamp-2">${book.title}</h3>
      <p class="text-xs text-gray-600">${book.author}</p>
      <p class="text-xs text-indigo-600">${book.genre}</p>
      <div class="flex justify-between items-center mt-2">
        <span class="font-bold text-green-600">$${book.price}</span>
        <button onclick="addToCart('${book.id}')" class="bg-indigo-600 text-white text-xs px-3 py-1 rounded" ${book.stock <= 0 ? 'disabled' : ''}>
          ${book.stock <= 0 ? 'Out' : 'Add'}
        </button>
      </div>
      <p class="text-xs text-gray-500 mt-1">Stock: ${book.stock}</p>
    </div>
  `).join('');
}

document.getElementById('loadMoreBtn').onclick = () => loadBooks(false);

document.getElementById('searchInput').addEventListener('input', debounce(() => {
  const search = document.getElementById('searchInput').value.trim();
  const genre = document.getElementById('genreFilter').value;
  
  let q = query(collection(db, "books"), orderBy("title"));
  if (genre) q = query(q, where("genre", "==", genre));
  if (search) q = query(q, where("title", ">=", search), where("title", "<=", search + '\uf8ff'));
  
  loadCustomQuery(q);
}, 500));

document.getElementById('genreFilter').addEventListener('change', () => {
  document.getElementById('searchInput').dispatchEvent(new Event('input'));
});

function loadCustomQuery(q) {
  onSnapshot(query(q, limit(PAGE_SIZE)), (snapshot) => {
    allBooks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    renderBooks(allBooks);
    document.getElementById('loadMoreBtn').classList.add('hidden');
  });
}

window.addToCart = (bookId) => {
  const book = allBooks.find(b => b.id === bookId);
  if (book.stock <= 0) return alert('Out of stock');
  const existing = cart.find(item => item.id === bookId);
  if (existing) existing.qty++;
  else cart.push({ ...book, qty: 1 });
  updateCart();
}

function updateCart() {
  localStorage.setItem('bookCart', JSON.stringify(cart));
  document.getElementById('cartCount').textContent = cart.reduce((sum, item) => sum + item.qty, 0);
  document.getElementById('cartItems').innerHTML = cart.map(item => `
    <div class="flex gap-2 border-b pb-2">
      <img src="${item.cover}" class="w-12 h-16 object-cover rounded">
      <div class="flex-1">
        <p class="text-sm font-semibold">${item.title}</p>
        <p class="text-xs text-gray-600">$${item.price} x ${item.qty}</p>
      </div>
    </div>
  `).join('');
  const total = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
  document.getElementById('cartTotal').textContent = `$${total.toFixed(2)}`;
}

document.getElementById('cartBtn').onclick = () => document.getElementById('cartSidebar').classList.remove('translate-x-full');
document.getElementById('closeCart').onclick = () => document.getElementById('cartSidebar').classList.add('translate-x-full');

document.getElementById('checkoutBtn').onclick = async () => {
  if (cart.length === 0) return alert('Cart is empty');
  const name = prompt('Enter your name for COD:');
  if (!name) return;
  const phone = prompt('Enter your phone:');
  if (!phone) return;
  
  const batch = writeBatch(db);
  for (const item of cart) {
    const bookRef = doc(db, "books", item.id);
    batch.update(bookRef, { stock: item.stock - item.qty });
  }
  
  const orderRef = doc(collection(db, "orders"));
  batch.set(orderRef, {
    customerName: name, phone: phone, items: cart,
    total: cart.reduce((sum, item) => sum + item.price * item.qty, 0),
    status: "pending", createdAt: new Date()
  });
  
  await batch.commit();
  alert('Order placed! We will call you for COD.');
  cart = []; updateCart();
  document.getElementById('cartSidebar').classList.add('translate-x-full');
}

const adminModal = document.getElementById('adminModal');
document.getElementById('adminLoginBtn').onclick = () => adminModal.classList.remove('hidden');
document.getElementById('closeAdminModal').onclick = () => adminModal.classList.add('hidden');

document.getElementById('adminLoginSubmit').onclick = () => {
  if (document.getElementById('adminPass').value === ADMIN_PASSWORD) {
    document.getElementById('adminLoginForm').classList.add('hidden');
    document.getElementById('adminPanel').classList.remove('hidden');
    loadAdminBooks(); loadAdminOrders();
  } else alert('Wrong password');
}

document.getElementById('adminLogout').onclick = () => {
  document.getElementById('adminLoginForm').classList.remove('hidden');
  document.getElementById('adminPanel').classList.add('hidden');
  adminModal.classList.add('hidden');
}

document.querySelectorAll('.adminTab').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.adminTab').forEach(b => b.classList.remove('border-indigo-600'));
    btn.classList.add('border-indigo-600');
    document.querySelectorAll('.adminTabContent').forEach(c => c.classList.add('hidden'));
    document.getElementById(btn.dataset.tab + 'Tab').classList.remove('hidden');
  }
});

document.getElementById('addBookForm').onsubmit = async (e) => {
  e.preventDefault();
  const form = e.target;
  await addDoc(collection(db, "books"), {
    title: form.title.value, author: form.author.value, isbn: form.isbn.value,
    price: parseFloat(form.price.value), stock: parseInt(form.stock.value),
    genre: form.genre.value, cover: form.cover.value, desc: form.desc.value,
    createdAt: new Date()
  });
  alert('Book added!'); form.reset(); loadAdminBooks();
}

async function loadAdminBooks() {
  const q = query(collection(db, "books"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);
  document.getElementById('adminBookList').innerHTML = snapshot.docs.map(doc => {
    const b = doc.data();
    return `<div class="flex justify-between items-center p-2 border rounded">
      <div><b>${b.title}</b> - $${b.price} - Stock: ${b.stock}</div>
      <div><button onclick="deleteBook('${doc.id}')" class="bg-red-500 text-white px-2 py-1 text-xs rounded">Delete</button></div>
    </div>`;
  }).join('');
}

window.deleteBook = async (id) => {
  if (confirm('Delete this book?')) {
    await deleteDoc(doc(db, "books", id));
    loadAdminBooks();
  }
}

async function loadAdminOrders() {
  const q = query(collection(db, "orders"), orderBy("createdAt", "desc"));
  const snapshot = await getDocs(q);
  document.getElementById('adminOrderList').innerHTML = snapshot.docs.map(doc => {
    const o = doc.data();
    return `<div class="p-3 border rounded">
      <p><b>${o.customerName}</b> - ${o.phone} - $${o.total} - ${o.status}</p>
      <p class="text-xs">${o.items.map(i => i.title + ' x' + i.qty).join(', ')}</p>
      <button onclick="markShipped('${doc.id}')" class="bg-green-500 text-white px-2 py-1 text-xs rounded mt-1">Mark Shipped</button>
    </div>`;
  }).join('');
}

window.markShipped = async (id) => {
  await updateDoc(doc(db, "orders", id), { status: "shipped" });
  loadAdminOrders();
}

function debounce(func, wait) {
  let timeout;
  return function executedFunction(...args) {
    const later = () => { clearTimeout(timeout); func(...args); };
    clearTimeout(timeout); timeout = setTimeout(later, wait);
  };
}

loadBooks(); updateCart();
</script>
</body>
</html>
